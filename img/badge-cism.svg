<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="badgeBgCism" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </radialGradient>
    <filter id="badgeShadowCism">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#badgeBgCism)" stroke="#b8860b" stroke-width="2" filter="url(#badgeShadowCism)"/>

  <!-- Decorative outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#daa520" stroke-width="1" opacity="0.5"/>

  <!-- Inner hexagon accent -->
  <g opacity="0.4">
    <path d="M 100 50 L 130 65 L 130 95 L 100 110 L 70 95 L 70 65 Z"
          fill="none" stroke="#b8860b" stroke-width="1.5"/>
  </g>

  <!-- Main text: CISM -->
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        text-anchor="middle" fill="#daa520">CISM</text>

  <!-- Subtitle text -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="11"
        text-anchor="middle" fill="#a0a0a0">ISACA Certified</text>
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="9"
        text-anchor="middle" fill="#666666">Information Security Manager</text>

  <!-- Decorative corner elements -->
  <circle cx="75" cy="65" r="1.5" fill="#b8860b"/>
  <circle cx="125" cy="65" r="1.5" fill="#b8860b"/>
  <circle cx="75" cy="135" r="1.5" fill="#b8860b"/>
  <circle cx="125" cy="135" r="1.5" fill="#b8860b"/>
</svg>