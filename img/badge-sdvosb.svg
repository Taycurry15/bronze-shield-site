<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="badgeBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </radialGradient>
    <filter id="badgeShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#badgeBg)" stroke="#b8860b" stroke-width="2" filter="url(#badgeShadow)"/>

  <!-- Decorative outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#daa520" stroke-width="1" opacity="0.5"/>

  <!-- Inner shield shape for badge -->
  <path d="M 100 45 L 140 65 L 140 95 Q 140 125 100 150 Q 60 125 60 95 L 60 65 Z"
        fill="none" stroke="#daa520" stroke-width="1.5" opacity="0.7"/>

  <!-- Main text: SDVOSB -->
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="26" font-weight="bold"
        text-anchor="middle" fill="#daa520">SDVOSB</text>

  <!-- Subtitle text -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#a0a0a0">Service-Disabled</text>
  <text x="100" y="148" font-family="Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#a0a0a0">Veteran-Owned</text>

  <!-- Decorative star elements -->
  <circle cx="60" cy="75" r="2" fill="#b8860b"/>
  <circle cx="140" cy="75" r="2" fill="#b8860b"/>
</svg>