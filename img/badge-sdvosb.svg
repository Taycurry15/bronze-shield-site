<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring - SBA navy blue -->
  <circle cx="100" cy="100" r="98" fill="#002664"/>
  <circle cx="100" cy="100" r="93" fill="#ffffff"/>
  <circle cx="100" cy="100" r="88" fill="#002664"/>

  <!-- Curved text: SERVICE-DISABLED VETERAN-OWNED around top -->
  <defs>
    <path id="topArc" d="M 30,100 a 70,70 0 0,1 140,0" fill="none"/>
    <path id="bottomArc" d="M 170,108 a 70,70 0 0,1 -140,0" fill="none"/>
  </defs>
  <text font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">SERVICE-DISABLED</textPath>
  </text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">SMALL BUSINESS</textPath>
  </text>

  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="50" fill="#ffffff" stroke="#002664" stroke-width="1.5"/>

  <!-- SBA shield/logo area -->
  <text x="100" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#002664" letter-spacing="1.5">U.S. SBA</text>

  <!-- Star -->
  <polygon points="100,88 103,96 112,96 105,101 108,110 100,105 92,110 95,101 88,96 97,96" fill="#002664"/>

  <!-- VETERAN OWNED centered -->
  <text x="100" y="124" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="700" fill="#002664" letter-spacing="1">VETERAN</text>
  <text x="100" y="135" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="700" fill="#002664" letter-spacing="1">OWNED</text>

  <!-- Red CERTIFIED ribbon -->
  <rect x="55" y="150" width="90" height="20" rx="3" fill="#BF0A30"/>
  <text x="100" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="700" fill="#ffffff" letter-spacing="2">CERTIFIED</text>

  <!-- Decorative stars on navy ring -->
  <g fill="#ffffff">
    <polygon points="100,8 101.5,12 106,12 102.5,14.5 104,19 100,16.5 96,19 97.5,14.5 94,12 98.5,12" transform="scale(0.6) translate(67,-2)"/>
    <polygon points="100,8 101.5,12 106,12 102.5,14.5 104,19 100,16.5 96,19 97.5,14.5 94,12 98.5,12" transform="scale(0.5) translate(40,10)"/>
    <polygon points="100,8 101.5,12 106,12 102.5,14.5 104,19 100,16.5 96,19 97.5,14.5 94,12 98.5,12" transform="scale(0.5) translate(160,10)"/>
    <polygon points="100,8 101.5,12 106,12 102.5,14.5 104,19 100,16.5 96,19 97.5,14.5 94,12 98.5,12" transform="scale(0.5) translate(40,340)"/>
    <polygon points="100,8 101.5,12 106,12 102.5,14.5 104,19 100,16.5 96,19 97.5,14.5 94,12 98.5,12" transform="scale(0.5) translate(160,340)"/>
  </g>
</svg>