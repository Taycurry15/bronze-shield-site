<svg viewBox="0 0 900 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stepGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:0.1" />
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle" fill="#daa520">RMF Lifecycle - 6 Steps</text>

  <!-- Connecting line -->
  <line x1="100" y1="120" x2="800" y2="120" stroke="#666666" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Step 1: Categorize -->
  <g>
    <circle cx="100" cy="120" r="35" fill="url(#stepGradient)" stroke="#daa520" stroke-width="2" filter="url(#nodeGlow)"/>
    <text x="100" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          text-anchor="middle" fill="#daa520">1</text>
    <text x="100" y="155" font-family="Arial, sans-serif" font-size="12"
          text-anchor="middle" fill="#a0a0a0">Categorize</text>
  </g>

  <!-- Arrow 1->2 -->
  <path d="M 135 120 L 165 120" stroke="#b8860b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="165,120 175,115 175,125" fill="#b8860b" id="arrowhead"/>

  <!-- Step 2: Select -->
  <g>
    <circle cx="220" cy="120" r="35" fill="url(#stepGradient)" stroke="#daa520" stroke-width="2" filter="url(#nodeGlow)"/>
    <text x="220" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          text-anchor="middle" fill="#daa520">2</text>
    <text x="220" y="155" font-family="Arial, sans-serif" font-size="12"
          text-anchor="middle" fill="#a0a0a0">Select</text>
  </g>

  <!-- Arrow 2->3 -->
  <path d="M 255 120 L 285 120" stroke="#b8860b" stroke-width="2" fill="none"/>
  <polygon points="285,120 295,115 295,125" fill="#b8860b"/>

  <!-- Step 3: Implement -->
  <g>
    <circle cx="340" cy="120" r="35" fill="url(#stepGradient)" stroke="#daa520" stroke-width="2" filter="url(#nodeGlow)"/>
    <text x="340" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          text-anchor="middle" fill="#daa520">3</text>
    <text x="340" y="155" font-family="Arial, sans-serif" font-size="12"
          text-anchor="middle" fill="#a0a0a0">Implement</text>
  </g>

  <!-- Arrow 3->4 -->
  <path d="M 375 120 L 405 120" stroke="#b8860b" stroke-width="2" fill="none"/>
  <polygon points="405,120 415,115 415,125" fill="#b8860b"/>

  <!-- Step 4: Assess -->
  <g>
    <circle cx="460" cy="120" r="35" fill="url(#stepGradient)" stroke="#daa520" stroke-width="2" filter="url(#nodeGlow)"/>
    <text x="460" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          text-anchor="middle" fill="#daa520">4</text>
    <text x="460" y="155" font-family="Arial, sans-serif" font-size="12"
          text-anchor="middle" fill="#a0a0a0">Assess</text>
  </g>

  <!-- Arrow 4->5 -->
  <path d="M 495 120 L 525 120" stroke="#b8860b" stroke-width="2" fill="none"/>
  <polygon points="525,120 535,115 535,125" fill="#b8860b"/>

  <!-- Step 5: Authorize -->
  <g>
    <circle cx="580" cy="120" r="35" fill="url(#stepGradient)" stroke="#daa520" stroke-width="2" filter="url(#nodeGlow)"/>
    <text x="580" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          text-anchor="middle" fill="#daa520">5</text>
    <text x="580" y="155" font-family="Arial, sans-serif" font-size="12"
          text-anchor="middle" fill="#a0a0a0">Authorize</text>
  </g>

  <!-- Arrow 5->6 -->
  <path d="M 615 120 L 645 120" stroke="#b8860b" stroke-width="2" fill="none"/>
  <polygon points="645,120 655,115 655,125" fill="#b8860b"/>

  <!-- Step 6: Monitor -->
  <g>
    <circle cx="700" cy="120" r="35" fill="url(#stepGradient)" stroke="#daa520" stroke-width="2" filter="url(#nodeGlow)"/>
    <text x="700" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          text-anchor="middle" fill="#daa520">6</text>
    <text x="700" y="155" font-family="Arial, sans-serif" font-size="12"
          text-anchor="middle" fill="#a0a0a0">Monitor</text>
  </g>

  <!-- Feedback arrow from 6 back to 1 (indicating continuous cycle) -->
  <path d="M 665 100 Q 450 30 135 100" stroke="#666666" stroke-width="2" stroke-dasharray="5,5" fill="none" opacity="0.6"/>
  <text x="450" y="50" font-family="Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#666666" opacity="0.7">Continuous Monitoring & Feedback</text>

  <!-- Legend -->
  <text x="100" y="210" font-family="Arial, sans-serif" font-size="11"
        fill="#a0a0a0">Each step builds on the previous, creating a continuous risk management lifecycle</text>
</svg>